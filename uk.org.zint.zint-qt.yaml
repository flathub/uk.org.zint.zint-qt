app-id: uk.org.zint.zint-qt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: zint-qt
rename-desktop-file: zint-qt.desktop
rename-icon: zint-qt
finish-args:
  - --share=ipc
  - --socket=cups
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home:ro
  - --filesystem=xdg-documents:rw
modules:
  - name: zint-qt
    buildsystem: cmake-ninja
    config-opts:
      - -DZINT_QT6=ON
    build-commands:
      - install -Dm644 uk.org.zint.zint-qt.appdata.xml -t /app/share/metainfo/
      - install -Dm644 zint-qt.desktop -t /app/share/applications/
      - install -Dm644 frontend_qt/images/scalable/zint-qt.svg -t /app/share/icons/hicolor/scalable/apps/
    sources:
      - type: archive
        url: https://download.sourceforge.net/project/zint/zint/2.16.0/zint-2.16.0-src.tar.gz
        sha256: 37e767afada2403bb9ae49b93a19eb0a9e944a0c278d9f23522746b3d08a3c4b
        x-checker-data:
          type: anitya
          project-id: 13683
          url-template: https://download.sourceforge.net/project/zint/zint/$version/zint-$version-src.tar.gz
      - type: file
        path: uk.org.zint.zint-qt.appdata.xml
      # - type: patch
      #   path: clipboard.patch
